name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install memdiver with dev extras
        run: python -m pip install -e '.[dev]'
      - name: Run pytest
        run: python -m pytest -q

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Colour-literal lint (baseline-locked)
        run: node scripts/check-no-tailwind-colour-literals.mjs
      # Hex-literal lint remains advisory-only for now (49 pre-existing
      # offenders, no baseline-lock). Wire it into CI once either
      # (a) those offenders are migrated, or (b) the script grows a
      # baseline-lock mode matching the colour-literal check.

  a11y:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            tests/e2e/package-lock.json
      - name: Install memdiver
        run: python -m pip install -e '.[dev]'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install e2e deps
        working-directory: tests/e2e
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium
      - name: Run a11y specs (baseline assertion)
        working-directory: tests/e2e
        env:
          BACKEND_PORT: '8091'
          FRONTEND_PORT: '5191'
        run: npx playwright test specs/a11y- --reporter=line
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: tests/e2e/playwright-report/
