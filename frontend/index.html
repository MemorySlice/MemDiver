<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/memdiver-logo.svg?v=2" />
    <link rel="apple-touch-icon" href="/memdiver-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemDiver — Memory Dump Analysis</title>
    <script>
      // FOUC prevention: apply theme before React mounts
      (function () {
        var t = localStorage.getItem("memdiver-theme");
        var dark =
          t === "dark" ||
          (!t && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
